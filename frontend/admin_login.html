<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso al panel | Styles ✂ Mary</title>
    <style>
      :root {
        color-scheme: light;
        font-family: 'Inter', sans-serif;
        --bg: #f8f1eb;
        --surface: #ffffff;
        --text: #2b1f18;
        --muted: #7f6b5d;
        --accent: #c19844;
        --border: rgba(193, 156, 96, 0.2);
        --shadow: 0 30px 70px rgba(112, 77, 39, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: linear-gradient(180deg, #fbf3e9 0%, #f4ebe3 100%);
        color: var(--text);
      }

      .card {
        width: min(500px, 100%);
        background: var(--surface);
        border-radius: 32px;
        padding: 2.3rem;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-weight: 800;
        letter-spacing: 0.06em;
        margin-bottom: 1rem;
        font-size: 1.05rem;
      }

      .brand span {
        color: var(--accent);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0 0 1.4rem;
        color: var(--muted);
        line-height: 1.7;
      }

      form {
        display: grid;
        gap: 1rem;
      }

      label {
        display: grid;
        gap: 0.4rem;
        font-weight: 600;
        color: var(--text);
      }

      input {
        width: 100%;
        border-radius: 18px;
        border: 1px solid rgba(193, 156, 96, 0.24);
        padding: 1rem 1.1rem;
        background: #fcf4eb;
        color: var(--text);
        font: inherit;
      }

      input:focus {
        outline: none;
        box-shadow: 0 0 0 4px rgba(193, 156, 96, 0.18);
      }

      button {
        width: 100%;
        border: none;
        border-radius: 999px;
        padding: 1rem 1.4rem;
        background: linear-gradient(135deg, #c19844, #e0bf71);
        color: #2b1f18;
        font-weight: 800;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 16px 34px rgba(193, 156, 96, 0.22);
      }

      .error {
        margin-bottom: 1rem;
        padding: 1rem 1.1rem;
        border-radius: 18px;
        background: #fff2f0;
        color: #8d3b37;
        border: 1px solid #f3c4c2;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">Styles <span>✂ Mary</span></div>
      <h1>Panel de administración</h1>
      <p>Ingresa tus credenciales para acceder al panel de gestión.</p>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="post">
        <input type="hidden" name="next" value="{{ next_url }}" />
        <label>
          Usuario
          <input type="text" name="username" required autocomplete="username" />
        </label>
        <label>
          Contraseña
          <input type="password" name="password" required autocomplete="current-password" />
        </label>
        <button type="submit">Entrar</button>
      </form>
    </div>
  </body>
</html>
