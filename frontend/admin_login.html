<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso al panel | Peluquería Aurora</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #fcf7f3, #f5e8de);
        color: #241c18;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      .card {
        width: min(420px, 100%);
        background: white;
        border-radius: 22px;
        padding: 2rem;
        box-shadow: 0 16px 40px rgba(79, 44, 27, 0.12);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.6rem;
      }

      p {
        margin: 0 0 1rem;
        color: #6f625b;
      }

      label {
        display: block;
        margin-bottom: 0.9rem;
        font-weight: 600;
      }

      input {
        width: 100%;
        padding: 0.8rem 0.9rem;
        margin-top: 0.35rem;
        border: 1px solid #e0cfc1;
        border-radius: 12px;
        font: inherit;
      }

      button {
        width: 100%;
        border: none;
        border-radius: 999px;
        padding: 0.9rem 1rem;
        background: linear-gradient(135deg, #a55a3d, #c78257);
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      .error {
        margin-bottom: 1rem;
        padding: 0.8rem 0.9rem;
        border-radius: 12px;
        background: #fff3f1;
        color: #9b4235;
        border: 1px solid #f1c3bb;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Panel de administración</h1>
      <p>Ingresa tus credenciales para continuar.</p>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="post">
        <input type="hidden" name="next" value="{{ next_url }}" />
        <label>
          Usuario
          <input type="text" name="username" required autocomplete="username" />
        </label>
        <label>
          Contraseña
          <input type="password" name="password" required autocomplete="current-password" />
        </label>
        <button type="submit">Entrar</button>
      </form>
    </div>
  </body>
</html>
